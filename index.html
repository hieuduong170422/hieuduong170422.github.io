<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English with Anna & Mark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #FFE5B4 0%, #B4E5FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2.5em; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; }
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
        }
        .info p { margin: 8px 0; }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        .links a {
            padding: 14px 28px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        .youtube { background: #ff0000; }
        .tiktok { background: #000; }
        .facebook { background: #1877f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 English with Anna & Mark</h1>
        <p class="subtitle">Learn English through natural conversations</p>
        
        <div class="info">
            <p>📚 New listening videos every week</p>
            <p>🗣️ Levels: A2, B1, B2</p>
            <p>🎧 Perfect for daily English practice</p>
        </div>
        
        <div class="links">
            <a href="#" class="youtube">📺 YouTube</a>
            <a href="#" class="tiktok">🎵 TikTok</a>
            <a href="#" class="facebook">👍 Facebook</a>
        </div>
    </div>
</body>
</html>
